.wrap{max-width:680px;margin:0 auto;padding:0 18px;}

.tl{position:relative;padding-left:26px;margin-top:18px;}
.tl::before{content:"";position:absolute;left:6px;top:8px;bottom:8px;width:1.5px;background:var(--line);}
.ev{position:relative;margin-bottom:14px;}
.ev::before{content:"";position:absolute;left:-26px;top:18px;width:11px;height:11px;border-radius:50%;background:var(--sand);border:2px solid var(--gold-soft);transform:translateX(.5px);}
.ev.tz::before{border-color:var(--coral);background:var(--coral);box-shadow:0 0 0 4px var(--coral-soft);}

.prep-filter{max-width:680px;width:calc(100% - 36px);margin:18px auto 0;padding:14px 18px;background:#fff;border:1px solid var(--coral-soft);border-radius:14px;box-shadow:var(--shadow);}

.prep li{margin-bottom:8px;}
.prep li:last-child{margin-bottom:0;}

.prep input[type="checkbox"]{margin-top:3px;accent-color:var(--coral);flex:0 0 auto;width:16px;height:16px;cursor:pointer;}

.adr-wrap{max-width:680px;width:calc(100% - 36px);margin:12px auto 0;padding:14px 18px;background:#fff;border:1px solid #cfe0dd;border-radius:14px;box-shadow:var(--shadow);}

.adr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.subgroup{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;}
.subgroup-title{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--gold);margin-bottom:8px;font-weight:600;}
.sub{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
.sub-num{flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:var(--sea-light);color:var(--sea-deep);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.sub.tzrole .sub-num{background:var(--coral);color:#fff;}
.sub-body{flex:1;font-size:13.5px;color:var(--ink);line-height:1.4;}
.sub-body .who{display:block;font-size:11.5px;color:var(--ink-soft);margin-top:1px;}
.sub-body .who b{color:var(--coral);}
.foot{text-align:center;margin-top:48px;padding-top:26px;border-top:1px solid var(--line);}
.foot .heart{color:var(--gold);font-family:'Fraunces';font-style:italic;font-size:20px;}
.foot p{font-size:12.5px;color:var(--ink-soft);margin-top:8px;}
.foot .names{font-family:'Fraunces';font-style:italic;font-size:15px;color:var(--ink);margin-top:4px;}
.scrolltop{position:fixed;bottom:18px;right:18px;z-index:60;width:46px;height:46px;border-radius:50%;background:var(--sea-deep);color:#fff;border:none;font-size:18px;cursor:pointer;box-shadow:0 6px 18px rgba(39,74,77,.35);opacity:0;pointer-events:none;transition:opacity .3s;}
.scrolltop.show{opacity:1;pointer-events:auto;}
.errbox{max-width:680px;margin:40px auto;padding:18px 20px;background:#fff;border:1px solid var(--coral);border-radius:12px;color:var(--coral);font-size:14px;line-height:1.5;}

.lightbox{position:fixed;inset:0;z-index:100;background:rgba(20,18,15,.92);display:flex;align-items:center;justify-content:center;padding:60px 20px 90px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}

.lightbox-content{max-width:min(960px,100%);max-height:100%;display:flex;flex-direction:column;align-items:center;gap:14px;}

  <button class="lightbox-prev" id="lightboxPrev" aria-label="Vorheriges Bild">‹</button>
  <button class="lightbox-next" id="lightboxNext" aria-label="Nächstes Bild">›</button>
  <div class="lightbox-content">
    <img id="lightboxImg" alt="">
    <div class="lightbox-caption" id="lightboxCap"></div>
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>
</div>

<script>
(function(){
  // ---- Passwort-Schutz ----
  var _PW='Stiffler2026', _KEY='wpw';
  if(localStorage.getItem(_KEY)!==_PW){
    var _s=document.getElementById('pwscreen');
    _s.style.display='flex';
    var _i=document.getElementById('pwInput');
    var _b=document.getElementById('pwBtn');
    var _e=document.getElementById('pwError');
    function _ok(){
      if(_i.value===_PW){localStorage.setItem(_KEY,_PW);location.reload();}
      else{_e.style.display='block';_i.value='';_i.focus();}
    }
    _b.addEventListener('click',_ok);
    _i.addEventListener('keydown',function(e){if(e.key==='Enter')_ok();});
    _i.focus();
    return; // kein Rendering ohne korrektes Passwort
  }

  // ---- HTML-Escaping, damit Text nichts kaputt macht ----
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

  // ---- Notiz formatieren: bei todo wird "Marvin:" o.ä. (alles vor erstem Doppelpunkt) fett ----
  function renderNotiz(p){
    if(!p.notiz) return "";
    var cls = p.todo ? "note todo" : "note";
    var txt = esc(p.notiz);
    if(p.todo){
      var i = p.notiz.indexOf(":");
      if(i>-1){ txt = "<b>"+esc(p.notiz.slice(0,i+1))+"</b>"+esc(p.notiz.slice(i+1)); }
    }
    return '<div class="'+cls+'">'+txt+'</div>';
  }

  function renderChips(p){
    var out="";
    (p.personen||[]).forEach(function(x){ out+='<span class="chip person">'+esc(x)+'</span>'; });
    (p.externe||[]).forEach(function(x){ out+='<span class="chip ext">'+esc(x)+'</span>'; });
    if(p.tzrole) out+='<span class="chip tzrole">'+esc(p.tzrole)+'</span>';
    var cnt = (p.bilder && p.bilder.length) ? p.bilder.length : (p.foto ? 1 : 0);
    if(cnt) out+='<span class="chip foto">📷'+(cnt>1?' \xd7'+cnt:'')+'</span>';
    return out;
  }

  function renderListe(p){
    if(!p.liste || !p.liste.length) return "";
    return '<ul>'+p.liste.map(function(li){return '<li>'+esc(li)+'</li>';}).join('')+'</ul>';
  }

  function renderKarte(p){
    if(!p.karte) return "";
    var url = p.karte.url ? esc(p.karte.url) : "#";
    return '<a class="maplink" href="'+url+'" target="_blank" rel="noopener">📍 '+esc(p.karte.text)+'</a>';
  }

  function isVid(src){ return /\.(mp4|webm|ogg)$/i.test(src||''); }

  function renderFoto(p){
    var out = "";
    if(p.bilder && p.bilder.length){
      out += '<div class="bilder">'+p.bilder.map(function(b){
        var src = esc(b.src||"");
        var kom = b.kommentar ? '<div class="bild-kommentar">'+esc(b.kommentar)+'</div>' : '';
        if(isVid(b.src)){
          return '<div class="bild is-video">'+
            '<video src="'+src+'" controls playsinline preload="metadata"></video>'+
            kom+'</div>';
        }
        var alt = esc(b.kommentar||p.titel||"");
        return '<div class="bild"><img src="'+src+'" alt="'+alt+'" loading="lazy">'+kom+'</div>';
      }).join('')+'</div>';
    }
    if(p.foto) out += '<img class="photo" src="'+esc(p.foto)+'" alt="'+esc(p.titel)+'">';
    if(p.platzhalter && !(p.bilder && p.bilder.length)) out += '<div class="placeholder-img">📷 '+esc(p.platzhalter)+'</div>';
    return out;
  }

  function renderSchritte(p){
    if(!p.schritte || !p.schritte.length) return "";
    var inner = p.schritte.map(function(s,idx){
      var who = s.who ? '<span class="who">'+esc(s.who).replace(/Marvin|Marina/g,'<b>$&</b>')+'</span>' : '';
      return '<div class="sub'+(s.tzrole?' tzrole':'')+'">'+
               '<span class="sub-num">'+(idx+1)+'</span>'+
               '<span class="sub-body">'+esc(s.text)+who+'</span>'+
             '</div>';
    }).join('');
    var t = p.schritteTitel ? '<div class="subgroup-title">'+esc(p.schritteTitel)+'</div>' : '';
    return '<div class="subgroup">'+t+inner+'</div>';
  }

  function renderDetail(p){
    var body = renderNotiz(p)+renderListe(p)+renderKarte(p)+renderFoto(p)+renderSchritte(p);
    if(!body) body='<div class="note">—</div>';
    return '<div class="ev-detail">'+body+'</div>';
  }

  function renderPunkt(p){
    var tz = p.trauzeuge ? ' tz' : '';
    var open = p.offen ? ' open' : '';
    var zeit = p.zeit ? esc(p.zeit) : '—';
    var zeitCls = (!p.zeit || /[^0-9:]/.test(p.zeit) && !/^\d/.test(p.zeit)) ? 'ev-time none' : 'ev-time';
    // "ab 15", "jederzeit", "9–10", "≈22:00" sollen schmaler/kursiv: alles ohne führende Ziffer ODER mit Buchstaben
    if(/[a-zäöü]/i.test(p.zeit||"")) zeitCls='ev-time none';
    var titel = esc(p.titel)+(p.dauer? ' '+esc(p.dauer):'');
    return ''+
    '<details class="ev'+tz+'"'+open+'>'+
      '<summary class="ev-summary">'+
        '<span class="'+zeitCls+'">'+zeit+'</span>'+
        '<span class="ev-main">'+
          '<span class="ev-title">'+titel+'</span>'+
          '<span class="ev-meta">'+renderChips(p)+'</span>'+
        '</span>'+
        '<span class="ev-chevron">▾</span>'+
      '</summary>'+
      renderDetail(p)+
    '</details>';
  }

  function renderVorbereitungen(t){
    if(!t.vorbereitungen) return "";
    if(!t.vorbereitungen.length){
      return '<div class="prep all-done" data-day="'+esc(t.id)+'">'+
        '<div class="prep-title">📋 Vorbereitungen (Marvin)</div>'+
        '<div class="prep-empty">Keine Vorbereitungen für diesen Tag.</div>'+
      '</div>';
    }
    var items = t.vorbereitungen.map(function(text, idx){
      var id = "prep-"+t.id+"-"+idx;
      return '<li><label>'+
        '<input type="checkbox" data-prep="'+esc(id)+'">'+
        '<span class="prep-text">'+esc(text)+'</span>'+
      '</label></li>';
    }).join('');
    return '<div class="prep" data-day="'+esc(t.id)+'">'+
      '<div class="prep-title">📋 Vorbereitungen (Marvin)</div>'+
      '<ul>'+items+'</ul>'+
    '</div>';
  }

  function renderPrepFilter(){
    return '<section class="prep-filter">'+
      '<h3>📋 Vorbereitungen TODO</h3>'+
      '<div class="note">Du kannst gerne alle Punkte weiterdeligieren. Hauptsache es wird gemacht .</div>'+
      '<label><input type="checkbox" id="hideDonePreps"> Erledigte Vorbereitungen ausblenden</label>'+
    '</section>';
  }

  function renderAdressen(data){
    if(!data.adressen) return "";
    function cards(items){
      return '<div class="adr-grid">'+items.map(function(item){
        var pend = item.adresse==="Ausstehend";
        var addrCls = "adr-addr"+(pend?" pend":"");
        var link = item.url ? '<a class="adr-link" href="'+esc(item.url)+'" target="_blank" rel="noopener">📍 Karte</a>' : '';
        return '<div class="adr-card">'+
          '<div class="adr-name">'+esc(item.name)+'</div>'+
          '<div class="'+addrCls+'">'+esc(item.adresse)+'</div>'+
          link+
        '</div>';
      }).join('')+'</div>';
    }
    var locHtml = (data.adressen.locations&&data.adressen.locations.length)
      ? '<details class="adr-group"><summary>📍 Locations <span class="adr-chevron">▾</span></summary><div class="adr-group-body">'+cards(data.adressen.locations)+'</div></details>'
      : '';
    var perHtml = (data.adressen.personen&&data.adressen.personen.length)
      ? '<details class="adr-group"><summary>🏠 Unterkünfte <span class="adr-chevron">▾</span></summary><div class="adr-group-body">'+cards(data.adressen.personen)+'</div></details>'
      : '';
    return '<section class="adr-wrap"><h3>📍 Adressen</h3>'+locHtml+perHtml+'</section>';
  }

  function renderTag(t){
    var key = t.key ? ' keyday' : '';
    var tag = t.tag ? '<span class="day-tag">'+esc(t.tag)+'</span>' : '';
    var punkte = t.punkte.map(renderPunkt).join('');
    return ''+
    '<section class="day'+key+'" id="'+esc(t.id)+'">'+
      '<div class="day-head">'+
        '<span class="day-num">'+esc(t.nummer)+'</span>'+
        '<div><h2>'+esc(t.titel)+'</h2><span class="sub">'+esc(t.untertitel)+'</span></div>'+
        tag+
      '</div>'+
      renderVorbereitungen(t)+
      '<div class="tl">'+punkte+'</div>'+
    '</section>';
  }

  function renderNav(tage){
    var links = tage.map(function(t){
      var cls = t.key ? ' class="key"' : '';
      var label = t.titel.slice(0,2)+' '+(t.untertitel.split('·')[0].trim());
      // kompakteres Label: "Fr 12.6. · Standesamt"
      var kurz = t.titel.slice(0,2)+' '+t.untertitel.replace('·','·');
      return '<a href="#'+esc(t.id)+'"'+cls+'>'+esc(navLabel(t))+'</a>';
    }).join('');
    return '<nav class="daynav"><div class="daynav-inner">'+links+'</div></nav>';
  }
  function navLabel(t){
    var wd = t.titel.slice(0,2);
    var dm = (t.untertitel.match(/(\d+)\.\s*Juni/)||[])[1];
    var base = wd+' '+(dm?dm+'.6.':'');
    if(t.navLabel) return base+' · '+t.navLabel;
    if(t.key){ var stich=(t.untertitel.split('·')[1]||'').trim().split(' ')[0]; return base+(stich?' · '+stich:''); }
    return base;
  }

  function renderHero(k){
    return ''+
    '<header class="hero">'+
      '<div class="eyebrow">'+esc(k.eyebrow)+'</div>'+
      '<h1>'+esc(k.braut)+' <span class="amp">&</span> '+esc(k.braeutigam)+'</h1>'+
      '<div class="date">'+esc(k.datum)+'</div>'+
      '<div class="place">'+esc(k.ort)+'</div>'+
      '<div class="divider"></div>'+
      '<div class="for-who">'+esc(k.fuerWen)+'</div>'+
    '</header>'+
    '<div class="legend">'+
      '<span><span class="dot tz"></span> Trauzeugen-Aufgabe</span>'+
      '<span><span class="dot alex"></span> Amelie &amp; Alex</span>'+
      '<span><span class="dot ext"></span> Externe / Dienstleister</span>'+
    '</div>';
  }

  function renderFuss(f){
    return ''+
    '<footer class="foot">'+
      '<div class="heart">'+esc(f.gruss)+'</div>'+
      '<p>'+esc(f.zeile)+'</p>'+
      '<div class="names">'+esc(f.namen)+'</div>'+
    '</footer>';
  }

  // ---- Laden + Rendern ----
  var raw = document.getElementById('ablaufDaten').textContent;
  var data;
  try{
    data = JSON.parse(raw);
  }catch(e){
    document.getElementById('app').innerHTML =
      '<div class="errbox"><b>⚠️ Fehler im Datenblock</b>'+
      'Die Daten konnten nicht gelesen werden – meist ein vergessenes oder zu viel gesetztes <code>Komma</code>, '+
      'oder ein fehlendes <code>"</code>.<br><br>Technische Meldung:<br><code>'+esc(e.message)+'</code></div>';
    return;
  }

  var html = renderHero(data.kopf)
           + renderPrepFilter()
           + renderAdressen(data)
           + renderNav(data.tage)
           + '<main class="wrap">'
           + data.tage.map(renderTag).join('')
           + renderFuss(data.fuss)
           + '</main>';
  document.getElementById('app').innerHTML = html;

  // Scroll-to-top
  var stb=document.getElementById('scrolltop');
  window.addEventListener('scroll',function(){stb.classList.toggle('show',window.scrollY>500);});
  stb.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});

  // ---- Vorbereitungen: Häkchen merken + Filter "Erledigte ausblenden" ----
  function updateAllDone(){
    document.querySelectorAll('.prep').forEach(function(p){
      var boxes = p.querySelectorAll('input[type="checkbox"]');
      if(!boxes.length) return; // leere Tage bleiben als "all-done" markiert (siehe Render)
      var allDone = Array.prototype.every.call(boxes, function(b){return b.checked;});
      p.classList.toggle('all-done', allDone);
    });
  }
  document.querySelectorAll('input[data-prep]').forEach(function(cb){
    var key = cb.getAttribute('data-prep');
    if(localStorage.getItem(key)==='1') cb.checked = true;
    cb.addEventListener('change', function(){
      localStorage.setItem(key, cb.checked ? '1' : '0');
      updateAllDone();
    });
  });
  updateAllDone();
  var hideDone = document.getElementById('hideDonePreps');
  if(hideDone){
    if(localStorage.getItem('hideDonePreps')==='1') hideDone.checked = true;
    document.body.classList.toggle('hide-done-preps', hideDone.checked);
    hideDone.addEventListener('change', function(){
      localStorage.setItem('hideDonePreps', hideDone.checked ? '1' : '0');
      document.body.classList.toggle('hide-done-preps', hideDone.checked);
    });
  }

  // ---- Bild-Lightbox: Klick aufs Bild → Overlay mit größerer Version ----
  var lb = document.getElementById('lightbox');
  var lbImg = document.getElementById('lightboxImg');
  var lbCap = document.getElementById('lightboxCap');
  var lbCounter = document.getElementById('lightboxCounter');
  var lbPrev = document.getElementById('lightboxPrev');
  var lbNext = document.getElementById('lightboxNext');
  var lbGroup = [];
  var lbIdx = 0;

  function lbShow(){
    var it = lbGroup[lbIdx]; if(!it) return;
    lbImg.src = it.src; lbImg.alt = it.alt;
    lbCap.textContent = it.cap || '';
    lbCap.style.display = it.cap ? '' : 'none';
    if(lbGroup.length>1){
      lbPrev.style.display = ''; lbNext.style.display = '';
      lbCounter.style.display = '';
      lbCounter.textContent = (lbIdx+1)+' / '+lbGroup.length;
    } else {
      lbPrev.style.display = 'none'; lbNext.style.display = 'none';
      lbCounter.style.display = 'none';
    }
  }
  function lbOpen(group, idx){
    lbGroup = group; lbIdx = idx;
    lbShow();
    lb.hidden = false;
    document.body.classList.add('lb-open');
  }
  function lbClose(){
    lb.hidden = true;
    document.body.classList.remove('lb-open');
    lbImg.src = ''; // Speicher freigeben
  }
  function lbNextFn(){ lbIdx = (lbIdx+1) % lbGroup.length; lbShow(); }
  function lbPrevFn(){ lbIdx = (lbIdx-1+lbGroup.length) % lbGroup.length; lbShow(); }

  // Galerie-Bilder (nur Fotos, keine Videos)
  document.querySelectorAll('.bilder').forEach(function(g){
    var items = [];
    var imgEls = [];
    Array.prototype.forEach.call(g.querySelectorAll('.bild'), function(b){
      var img = b.querySelector('img');
      if(!img) return; // Video-Karte überspringen
      var cap = b.querySelector('.bild-kommentar');
      items.push({ src: img.src, alt: img.alt || '', cap: cap ? cap.textContent : '' });
      imgEls.push(img);
    });
    imgEls.forEach(function(img, i){
      img.addEventListener('click', function(){ lbOpen(items, i); });
    });
  });
  // Einzelne große Fotos (.photo)
  document.querySelectorAll('img.photo').forEach(function(img){
    img.addEventListener('click', function(){
      lbOpen([{src: img.src, alt: img.alt||'', cap: img.alt||''}], 0);
    });
  });

  lb.addEventListener('click', function(e){ if(e.target===lb) lbClose(); });
  document.getElementById('lightboxClose').addEventListener('click', lbClose);
  lbPrev.addEventListener('click', lbPrevFn);
  lbNext.addEventListener('click', lbNextFn);
  document.addEventListener('keydown', function(e){
    if(lb.hidden) return;
    if(e.key==='Escape') lbClose();
    else if(e.key==='ArrowLeft' && lbGroup.length>1) lbPrevFn();
    else if(e.key==='ArrowRight' && lbGroup.length>1) lbNextFn();
  });
})();
</script>

</body>
</html>
